services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fitpace
      POSTGRES_PASSWORD: fitpace
      POSTGRES_DB: fitpace
    ports:
      - "5432:5432"
    volumes:
      - fitpace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitpace -d fitpace"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://fitpace:fitpace@db:5432/fitpace
      API_KEY: dev-secret-key
      SCHEDULER_ENABLED: "true"
      LOG_LEVEL: INFO

volumes:
  fitpace_pgdata:
